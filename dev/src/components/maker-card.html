<!-- 制作者カード／逆導線CTA（案A＝作り手の顔を出す・実績先行型 / 03_seo §6-2 確定コピー）
     ポータルトップ・全ツールページ下部に共通で配置（partial）。
     見出し・リード・ボタン文言・リンク先は 03_seo §6-2 案A から転記（勝手に変えない）。
     アンカーは文脈語にする（§6-2 SEO 注記）。
     呼び出し側で makerId を渡す（aria-labelledby のユニーク化）。 -->
<section class="p-maker" aria-labelledby="{{ makerId }}">
  <div class="c-maker-card">
    <div class="c-maker-card__avatar" role="img" aria-label="制作者 黒田こうすけの顔写真"></div>
    <div>
      <p class="c-maker-card__name" id="{{ makerId }}">このツールを作った人について</p>
      <p class="c-maker-card__desc">
        「画像仕分け圧縮くん」は、フロントエンドの制作を仕事にしている個人が、自分の作業を少し楽にするために作りました。Webサイトやランディングページの制作・改修も承っています。
      </p>
      <div class="c-maker-card__links">
        <a class="c-link-arrow" href="{{ site.works }}">制作実績を見る</a>
        <a class="c-link-arrow" href="{{ site.contact }}">制作のご相談をする</a>
      </div>
    </div>
  </div>
</section>
